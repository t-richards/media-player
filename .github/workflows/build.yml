name: build

on:
  push:
    branches: [master]
    tags: ['*.*.*']
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Build app (x64)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\18\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          ml64 media-player-x64.asm /link /subsystem:windows /defaultlib:kernel32.lib /entry:WinMain

      - name: Build app (arm64)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\18\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" amd64_arm64
          armasm64 media-player-arm64.asm
          link media-player-arm64.obj /subsystem:windows /defaultlib:kernel32.lib /entry:WinMain /machine:arm64

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: media-player
          path: |
            media-player-x64.exe
            media-player-arm64.exe

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ github.ref_name }} --latest media-player-x64.exe media-player-arm64.exe